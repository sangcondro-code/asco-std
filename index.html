<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ASCO STUDIO — Invoice & Pembayaran</title>
<meta name="description" content="Invoice & pembayaran ASCO STUDIO">
<link rel="icon" href="https://raw.githubusercontent.com/sangcondro-code/asco.std/main/Logo%20Asco.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#1C1917; --brand:#129459; --brand-dark:#0B6B3F; --brand-light:#1E7A52;
    --paper:#FAF7F2; --border:#E7E2DA; --text-muted:#78716C; --warn:#C08A2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);font-family:'Inter',sans-serif;overflow:hidden;}

  #app-frame{
    position:fixed; inset:0; width:100%; height:100%; border:0; background:#fff;
    opacity:0; transition:opacity .4s ease;
  }
  #app-frame.ready{opacity:1;}

  #boot-screen{
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,.05), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(18,148,89,.35), transparent 50%),
      linear-gradient(150deg, var(--ink) 0%, #20241f 45%, var(--brand-dark) 100%);
    background-size:100% 100%, 100% 100%, 220% 220%;
    animation:boot-bg-drift 9s ease-in-out infinite alternate;
    transition:opacity .35s ease, visibility .35s ease;
  }
  #boot-screen.hidden{opacity:0; visibility:hidden; pointer-events:none;}
  @keyframes boot-bg-drift{
    0%{background-position:0% 0%, 100% 100%, 0% 50%;}
    100%{background-position:0% 0%, 100% 100%, 100% 50%;}
  }

  .boot-mark-wrap{position:relative; width:88px; height:88px; display:flex; align-items:center; justify-content:center;}
  .boot-ring{
    position:absolute; inset:0; border-radius:22px; border:1.5px solid rgba(255,255,255,.28);
    animation:boot-pulse 2.6s cubic-bezier(.4,0,.2,1) infinite;
  }
  .boot-ring.r2{animation-delay:1.3s;}
  @keyframes boot-pulse{
    0%{transform:scale(.82); opacity:0;}
    35%{opacity:.55;}
    100%{transform:scale(1.35); opacity:0;}
  }
  .boot-mark{
    position:relative; width:68px; height:68px; border-radius:18px; overflow:hidden;
    background:linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 12px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.15);
    z-index:1;
  }
  .boot-mark .boot-mono{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1.7rem; color:#fff; letter-spacing:.5px;
  }
  .boot-mark img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#fff; padding:9px;
  }
  .boot-name{
    font-family:'Space Grotesk',sans-serif; font-size:1rem; font-weight:700; letter-spacing:.3px; color:#fff;
    opacity:.92;
  }
  .boot-bar{width:150px; height:3px; border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden;}
  .boot-bar span{
    display:block; height:100%; width:36%; border-radius:99px;
    background:linear-gradient(90deg, transparent, var(--brand) 30%, #fff 55%, var(--brand) 80%, transparent);
    animation:boot-slide 1.35s ease-in-out infinite;
  }
  @keyframes boot-slide{
    0%{transform:translateX(-120%);}
    100%{transform:translateX(380%);}
  }
  .boot-label{
    font-size:.72rem; letter-spacing:.4px; color:rgba(255,255,255,.5); margin-top:-8px;
  }

  #fallback-screen{
    position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center; padding:24px;
    background:var(--paper);
  }
  #fallback-screen.show{display:flex;}
  .fallback-card{
    max-width:380px; width:100%; text-align:center; background:#fff; border:1px solid var(--border);
    border-radius:16px; padding:32px 28px; box-shadow:0 12px 32px rgba(28,25,23,.08);
  }
  .fallback-card svg{width:34px; height:34px; margin:0 auto 14px; display:block; color:var(--warn);}
  .fallback-card h1{
    font-family:'Space Grotesk',sans-serif; font-size:1.05rem; margin:0 0 8px; color:var(--ink);
  }
  .fallback-card p{font-size:.85rem; color:var(--text-muted); line-height:1.6; margin:0 0 20px;}
  .fallback-card a{
    display:inline-block; background:var(--brand); color:#fff; text-decoration:none; font-weight:700;
    font-size:.85rem; padding:11px 22px; border-radius:10px; transition:.15s;
  }
  .fallback-card a:hover{background:var(--brand-dark);}
</style>
</head>
<body>

<div id="boot-screen">
  <div class="boot-mark-wrap">
    <span class="boot-ring r1"></span>
    <span class="boot-ring r2"></span>
    <div class="boot-mark">
      <span class="boot-mono">A</span>
      <img src="https://raw.githubusercontent.com/sangcondro-code/asco.std/main/Logo%20Asco.jpeg" alt="" onerror="this.remove()">
    </div>
  </div>
  <div class="boot-name">ASCO STUDIO</div>
  <div class="boot-bar"><span></span></div>
  <div class="boot-label">MEMUAT INVOICE &amp; PEMBAYARAN…</div>
</div>

<div id="fallback-screen">
  <div class="fallback-card">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <h1>Halaman butuh waktu lebih lama dari biasanya</h1>
    <p>Ini bisa terjadi kalau koneksi sedang lambat, atau browser membatasi konten tertanam. Coba buka langsung lewat tombol di bawah.</p>
    <a id="fallback-link" href="#" target="_blank" rel="noopener">Buka Langsung</a>
  </div>
</div>

<iframe id="app-frame" title="ASCO STUDIO" referrerpolicy="strict-origin-when-cross-origin"></iframe>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUsoPf6HeLHTLnway9F6baVVQYtSTIyRXjnSpxZvxAppvSz_QocsJCayfcCWJfgKWLng/exec';

(function () {
  var query = window.location.search || '';
  var targetUrl = APPS_SCRIPT_URL + query;

  var frame = document.getElementById('app-frame');
  var bootScreen = document.getElementById('boot-screen');
  var fallbackScreen = document.getElementById('fallback-screen');
  document.getElementById('fallback-link').href = targetUrl;

  var loaded = false;

  frame.addEventListener('load', function () {
    loaded = true;
    frame.classList.add('ready');
    bootScreen.classList.add('hidden');
    fallbackScreen.classList.remove('show');
  });

  setTimeout(function () {
    if (!loaded) {
      bootScreen.classList.add('hidden');
      fallbackScreen.classList.add('show');
    }
  }, 12000);

  frame.src = targetUrl;
})();
</script>
</body>
</html>
